<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Certificates — humoridze</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
/* ─── Variables ─── */
:root {
  --bg:         #0a0a0f;
  --bg2:        #0f0f1a;
  --bg3:        #141420;
  --border:     #1e1e2e;
  --text:       #e2e2f0;
  --muted:      #6b6b8a;
  --accent:     #7c6af7;
  --accent2:    #4ecca3;
  --accent3:    #f7776a;
  --card:       #0d0d1a;
  --card-hover: #121225;
  --glow:       rgba(124,106,247,0.15);
  --glow2:      rgba(78,204,163,0.1);
  --font-mono:  'JetBrains Mono', monospace;
  --font-disp:  'Syne', sans-serif;
  --radius:     6px;
  --tr:         0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg:         #f5f4ff;
  --bg2:        #edeeff;
  --bg3:        #e6e5fb;
  --border:     #d0cff5;
  --text:       #16162a;
  --muted:      #7575a0;
  --accent:     #5b45e8;
  --accent2:    #1a9e7e;
  --accent3:    #d9483b;
  --card:       #ffffff;
  --card-hover: #f0efff;
  --glow:       rgba(91,69,232,0.1);
  --glow2:      rgba(26,158,126,0.08);
}

/* ─── Reset ─── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  line-height: 1.7;
  overflow-x: hidden;
  transition: background-color var(--tr), color var(--tr);
}
a { color:var(--accent); text-decoration:none; transition:color var(--tr); }
a:hover { color:var(--accent2); }
ul { list-style:none; }

/* grid bg — behind everything */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.25;
  pointer-events: none;
  z-index: -1;
  transition: opacity var(--tr);
}
[data-theme="light"] body::after { opacity: 0.12; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--accent); }

/* ─── Nav ─── */
nav {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.5rem;
  padding: 0 clamp(1.5rem,5vw,4rem);
  height: 60px;
  background-color: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: background-color var(--tr), border-color var(--tr);
}
nav.scrolled { background-color: var(--bg2); }

.nav-logo { font-family:var(--font-mono); font-weight:700; font-size:1rem; color:var(--accent); letter-spacing:0.05em; }
.nav-logo span { color:var(--accent2); }

.nav-links { display:flex; gap:2rem; align-items:center; }
.nav-links a {
  font-size:0.78rem; color:var(--muted); font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase;
  transition:color var(--tr); position:relative;
}
.nav-links a::after {
  content:''; position:absolute; bottom:-2px; left:0;
  width:0; height:1px; background:var(--accent2); transition:width var(--tr);
}
.nav-links a:hover { color:var(--text); }
.nav-links a:hover::after { width:100%; }

.nav-controls { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; }

.control-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--muted);
  font-family:var(--font-mono); font-size:0.72rem; padding:0.3rem 0.7rem;
  border-radius:var(--radius); cursor:pointer; letter-spacing:0.05em; white-space:nowrap;
  transition:all var(--tr);
}
.control-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--glow); }
.control-btn.active { border-color:var(--accent); color:var(--accent); background:var(--glow); }

.lang-group { display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.lang-group .control-btn { border:none; border-radius:0; border-right:1px solid var(--border); background:transparent; }
.lang-group .control-btn:last-child { border-right:none; }

/* ─── Hamburger ─── */
.hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; background:none; border:none; }
.hamburger span { display:block; width:22px; height:2px; background:var(--muted); border-radius:2px; transition:all var(--tr); }
.hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
.hamburger.open span:nth-child(2) { opacity:0; }
.hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

/* ─── Hero ─── */
section { position:relative; z-index:1; }

#hero {
  padding: clamp(3.5rem,8vw,6rem) clamp(1.5rem,8vw,8rem) clamp(3rem,6vw,5rem);
  overflow: hidden;
}
.hero-inner { position:relative; z-index:2; max-width:900px; width:100%; }

.hero-tag {
  display:inline-flex; align-items:center; gap:0.5rem;
  font-size:0.75rem; color:var(--accent2); letter-spacing:0.12em; text-transform:uppercase;
  margin-bottom:1.5rem; opacity:0; animation:fadeUp 0.6s 0.2s forwards;
}
.hero-tag::before { content:''; display:inline-block; width:20px; height:1px; background:var(--accent2); }

.hero-name {
  font-family:var(--font-disp); font-size:clamp(3rem,10vw,7rem);
  font-weight:800; line-height:0.95; letter-spacing:-0.03em; margin-bottom:0.5rem;
  opacity:0; animation:fadeUp 0.6s 0.35s forwards;
}
.hero-name .first { display:block; color:var(--text); }
.hero-name .last  { display:block; -webkit-text-stroke:1px var(--accent); color:transparent; }
[data-theme="light"] .hero-name .last { -webkit-text-stroke:1.5px var(--accent); }

.hero-handle {
  font-size:clamp(1rem,2.5vw,1.3rem); color:var(--accent); font-weight:500; margin-bottom:1.5rem;
  opacity:0; animation:fadeUp 0.6s 0.5s forwards;
}
.hero-handle span { color:var(--muted); }

.hero-desc {
  max-width:520px; font-size:0.88rem; color:var(--muted); line-height:1.8; margin-bottom:2.5rem;
  opacity:0; animation:fadeUp 0.6s 0.65s forwards;
}

.hero-cta { display:flex; gap:1rem; flex-wrap:wrap; opacity:0; animation:fadeUp 0.6s 0.8s forwards; }

.btn {
  display:inline-flex; align-items:center; gap:0.5rem;
  font-family:var(--font-mono); font-size:0.8rem; font-weight:500;
  letter-spacing:0.06em; text-transform:uppercase;
  padding:0.75rem 1.5rem; border-radius:var(--radius);
  cursor:pointer; border:none; text-decoration:none; transition:all var(--tr);
}
.btn-primary { background:var(--accent); color:#fff; box-shadow:0 0 20px var(--glow); }
.btn-primary:hover { background:var(--accent2); color:#fff; box-shadow:0 0 30px var(--glow2); transform:translateY(-2px); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); background:var(--glow); transform:translateY(-2px); }

.hero-orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
.hero-orb-1 { width:400px; height:400px; background:radial-gradient(circle,rgba(124,106,247,0.2),transparent 70%); top:-100px; right:-100px; animation:float1 8s ease-in-out infinite; }
.hero-orb-2 { width:300px; height:300px; background:radial-gradient(circle,rgba(78,204,163,0.15),transparent 70%); bottom:0; left:20%; animation:float2 10s ease-in-out infinite; }

.hero-meta {
  position:absolute; bottom:2.5rem; right:clamp(1.5rem,5vw,4rem);
  display:flex; flex-direction:column; align-items:flex-end; gap:0.25rem;
  opacity:0; animation:fadeIn 1s 1.2s forwards;
}
.hero-meta-item { font-size:0.72rem; color:var(--muted); display:flex; align-items:center; gap:0.5rem; }
.hero-meta-item::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--accent2); }

.scroll-indicator {
  position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:0.5rem;
  opacity:0; animation:fadeIn 1s 1.5s forwards;
}
.scroll-line { width:1px; height:50px; background:linear-gradient(180deg,var(--accent),transparent); animation:scrollPulse 2s ease-in-out infinite; }
.scroll-label { font-size:0.65rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; writing-mode:vertical-rl; }

/* ─── Sections ─── */
.section-wrap { padding:clamp(4rem,10vw,7rem) clamp(1.5rem,8vw,8rem); max-width:1100px; margin:0 auto; }
.section-header { display:flex; align-items:center; gap:1rem; margin-bottom:3.5rem; }
.section-num { font-size:0.72rem; color:var(--accent); letter-spacing:0.12em; font-weight:500; }
.section-title { font-family:var(--font-disp); font-size:clamp(1.8rem,4vw,2.8rem); font-weight:800; color:var(--text); letter-spacing:-0.02em; }
.section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

/* ─── About ─── */
#about { background-color:var(--bg2); }
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
.about-text p { font-size:0.88rem; color:var(--muted); line-height:1.9; margin-bottom:1.2rem; }
.about-text p strong { color:var(--text); font-weight:500; }
.about-highlight { border-left:2px solid var(--accent); padding-left:1rem; margin:1.5rem 0; font-size:0.85rem; color:var(--accent2); font-style:italic; }
.about-stats { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; transition:border-color var(--tr), transform var(--tr); }
.stat-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.stat-num { font-family:var(--font-disp); font-size:2.2rem; font-weight:800; color:var(--accent); line-height:1; margin-bottom:0.25rem; }
.stat-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }

/* ─── Skills ─── */
.skills-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; }
.skill-category {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem;
  position:relative; overflow:hidden;
  transition:border-color var(--tr), background var(--tr), transform var(--tr);
}
.skill-category::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transform:scaleX(0); transform-origin:left; transition:transform 0.4s ease;
}
.skill-category:hover::before { transform:scaleX(1); }
.skill-category:hover { border-color:var(--accent); transform:translateY(-3px); background:var(--card-hover); }
.skill-cat-title { font-size:0.72rem; color:var(--accent2); text-transform:uppercase; letter-spacing:0.12em; font-weight:500; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }
.skill-cat-title::before { content:'//'; color:var(--muted); }
.skill-tags { display:flex; flex-wrap:wrap; gap:0.5rem; }
.skill-tag { font-size:0.75rem; padding:0.25rem 0.6rem; border-radius:3px; background:var(--bg3); border:1px solid var(--border); color:var(--text); transition:all var(--tr); cursor:default; }
.skill-tag:hover { border-color:var(--accent); color:var(--accent); background:var(--glow); }

/* ─── Projects ─── */
#projects { background-color:var(--bg2); }
.projects-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; }
.project-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:1.75rem; display:flex; flex-direction:column; gap:1rem;
  position:relative; overflow:hidden; cursor:default;
  transition:border-color var(--tr), transform var(--tr);
}
.project-card::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),var(--glow),transparent 60%);
  opacity:0; transition:opacity 0.3s; pointer-events:none;
}
.project-card:hover::after { opacity:1; }
.project-card:hover { border-color:var(--accent); transform:translateY(-4px); }
.project-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
.project-year { font-size:0.7rem; color:var(--muted); letter-spacing:0.1em; flex-shrink:0; padding-top:0.15rem; }
.project-title { font-family:var(--font-disp); font-size:1.05rem; font-weight:600; color:var(--text); line-height:1.3; }
.project-desc { font-size:0.82rem; color:var(--muted); line-height:1.7; }
.project-tech { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:auto; }
.tech-badge { font-size:0.7rem; padding:0.2rem 0.5rem; border-radius:3px; background:var(--bg3); border:1px solid var(--border); color:var(--accent); font-weight:500; }

/* ─── Contacts ─── */
.contacts-inner { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
.contact-intro { font-size:0.88rem; color:var(--muted); line-height:1.9; margin-bottom:2rem; }
.contact-links { display:flex; flex-direction:column; gap:0.75rem; }

.contact-link {
  display:flex; align-items:center; gap:1rem; padding:1rem 1.25rem;
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-size:0.82rem; text-decoration:none;
  transition:border-color var(--tr), background var(--tr), color var(--tr), transform var(--tr);
}
.contact-link:hover { border-color:var(--accent); background:var(--glow); color:var(--accent); transform:translateX(4px); }

/* ── icon: fixed size, never disappears on hover ── */
.contact-link-icon {
  width:36px; height:36px; min-width:36px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg3); border-radius:4px; font-size:1rem;
  color:var(--text);
  transition:background var(--tr), color var(--tr);
  flex-shrink:0;
}
.contact-link:hover .contact-link-icon { background:var(--accent); color:#fff; }

.contact-link-text { display:flex; flex-direction:column; }
.contact-link-label { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
.contact-link-value { font-size:0.82rem; font-weight:500; }

/* ─── Terminal ─── */
.contact-terminal { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.terminal-bar { background:var(--bg3); padding:0.75rem 1rem; display:flex; align-items:center; gap:0.5rem; border-bottom:1px solid var(--border); }
.t-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.t-dot-r { background:#f7776a; } .t-dot-y { background:#f7c96a; } .t-dot-g { background:#4ecca3; }
.terminal-title { font-size:0.72rem; color:var(--muted); margin-left:0.5rem; }
.terminal-body { padding:1.25rem; font-size:0.8rem; line-height:2; min-height:180px; }
.t-line { display:flex; gap:0.5rem; flex-wrap:nowrap; }
.t-prompt { color:var(--accent2); flex-shrink:0; white-space:nowrap; }
.t-cmd { color:var(--text); }
.t-out { color:var(--muted); padding-left:1rem; }
.t-cursor { display:inline-block; width:8px; height:14px; background:var(--accent); animation:blink 1.2s step-end infinite; vertical-align:middle; margin-left:2px; }

/* ─── Footer ─── */
footer {
  position:relative; z-index:1;
  padding:2rem clamp(1.5rem,8vw,8rem);
  background-color: var(--bg2);
  border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-wrap:wrap; gap:1rem;
  font-size:0.75rem; color:var(--muted); text-align:center;
  transition: background-color var(--tr);
}
footer a { color:var(--muted); }
footer a:hover { color:var(--accent2); }

/* ─── Reveal ─── */
.reveal { opacity:0; transform:translateY(24px); transition:opacity 0.6s ease, transform 0.6s ease; }
.reveal.visible { opacity:1; transform:translateY(0); }
.reveal-delay-1 { transition-delay:0.1s; }
.reveal-delay-2 { transition-delay:0.2s; }
.reveal-delay-3 { transition-delay:0.3s; }
.reveal-delay-4 { transition-delay:0.4s; }

/* ─── Keyframes ─── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes float1  { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,20px) scale(1.05)} }
@keyframes float2  { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-30px) scale(0.95)} }
@keyframes scrollPulse { 0%,100%{opacity:0.3;transform:scaleY(1)} 50%{opacity:1;transform:scaleY(1.2)} }
@keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }

/* ─── Responsive ─── */
@media (max-width:768px) {
  .nav-links { display:none; }
  .nav-links.open {
    display:flex; flex-direction:column;
    position:fixed; top:60px; left:0; right:0;
    background:var(--bg2); border-bottom:1px solid var(--border);
    padding:1.5rem; gap:1rem; z-index:199;
  }
  .hamburger { display:flex; }
  .about-grid, .contacts-inner { grid-template-columns:1fr; gap:2rem; }
  .hero-meta, .scroll-indicator { display:none; }
}
@media (max-width:480px) {
  .about-stats { grid-template-columns:1fr 1fr; }
  .projects-grid, .skills-grid { grid-template-columns:1fr; }
  nav { height:auto; padding-top:0.6rem; padding-bottom:0.6rem; }
}

/* ─── Lang switch animation ─── */
@keyframes langOut {
  0%   { opacity: 1; transform: translateY(0);   filter: blur(0); }
  100% { opacity: 0; transform: translateY(-5px); filter: blur(3px); }
}
@keyframes langIn {
  0%   { opacity: 0; transform: translateY(7px);  filter: blur(5px); }
  65%  { filter: blur(0); }
  100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
}
@keyframes langBtnPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.88); }
  75%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.lang-out { animation: langOut 0.16s ease forwards; }
.lang-in  { animation: langIn  0.26s ease forwards; }
.lang-btn-pop { animation: langBtnPop 0.3s ease forwards; }
</style>
</head>
<body>

<nav id="navbar">
  <a class="nav-logo" href="index.html">hu<span>moridze</span></a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#skills">Skills</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#contacts">Contacts</a></li>
    <li><a href="certificates.html" style="color:var(--accent2)">Certificates</a></li>
  </ul>
  <div class="nav-controls">
    <button class="control-btn" id="theme-btn">&#9728; Light</button>
  </div>
</nav>

<section style="padding: clamp(4rem,10vw,7rem) clamp(1.5rem,8vw,8rem);">
  <div style="max-width:1100px; margin:0 auto;">
    <div class="section-header">
      <span class="section-num">05</span>
      <h2 class="section-title">Certificates</h2>
      <div class="section-line"></div>
    </div>

    <div class="projects-grid" id="cert-grid">
      <!-- карточки вставляются здесь вручную или через JS -->
    </div>
  </div>
</section>

<script>
// ── Список сертификатов ──────────────────────────────────────
// Просто добавляй объекты в этот массив
const certs = [
  {
    title: "Python",
    issuer: "Минцифры",
    year: "2026",
    file: "certificates/Python.pdf"
  },
  {
    title: "Docker",
    issuer: "Минцифры",
    year: "2026",
    file: "certificates/Docker.pdf"
  },
  {
    title: "API",
    issuer: "Минцифры",
    year: "2026",
    file: "certificates/API.pdf"
  },
  {
    title: "Git",
    issuer: "Минцифры",
    year: "2026",
    file: "certificates/Git.pdf"
  },
  {
    title: "Linux",
    issuer: "Минцифры",
    year: "2026",
    file: "certificates/Linux.pdf"
  },
  {
    title: "PostgreSQL",
    issuer: "Минцифры",
    year: "2026",
    file: "certificates/PostgreSQL.pdf"
  },
];
// ─────────────────────────────────────────────────────────────

const grid = document.getElementById('cert-grid');
certs.forEach(c => {
  grid.innerHTML += `
